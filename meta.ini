; ==========================================================
; 2026 终极智能平衡版 · 自动纠错 + 极致分流
; 逻辑：内网 > 自定义列表 > 专项分流 > 大网拦截 > 智能判定 > 兜底
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ----------------------------------------------------------
; 节点清洗
; ----------------------------------------------------------
exclude=官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|QQ群|客服|工单|官网地址


; ==========================================================
; 1️⃣ 规则层 (按优先级严密排列)
; ==========================================================

; --- [L1] 基础系统与局域网 (绝对直连) ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- [L2] 你的自定义列表 (置顶：含影视直连或必须代理的特殊站) ---
ruleset=DIRECT,clash-classic:https://raw.githubusercontent.com/ycl2006/meta/main/MyVideo.list,28800

; --- [L3] 专项代理分流 (确保高频服务精准走代理) ---
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=✨ Gemini,[]GEOSITE,google-gemini
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn
ruleset=🛠 GitHub,[]GEOSITE,github
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🔎 Google,[]GEOSITE,google
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=🪟 Microsoft,[]GEOSITE,microsoft
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest

; --- [L4] 中国大陆大网拦截 (防影视偷跑的核心防线) ---
; 此时还没匹配上的流量，如果是国内域名或 IP，直接在此掐断，不给后续走代理的机会
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- [L5] 机场 GFW 名单 (最后一次名单精准匹配) ---
ruleset=🚀 核心调度,[]GEOSITE,gfw

; --- [L6] 终极智能判定 (解决“漏网国外站”打不开的问题) ---
; 如果解析出是非中国 IP，且前面没匹配上，大概率是冷门国外站，送入调度
ruleset=🚀 核心调度,[]GEOIP,!cn

; --- [L7] 最后的盲区 (既没域名记录也没 IP 记录的神秘流量) ---
ruleset=🐟 漏网之鱼,[]FINAL


; ==========================================================
; 2️⃣ 策略组 (专项分组)
; ==========================================================
custom_proxy_group=🤖 ChatGPT`select`[]⚡ 智能优选`[]🇸🇬 SG`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT
custom_proxy_group=✨ Gemini`select`[]⚡ 智能优选`[]🇸🇬 SG`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT
custom_proxy_group=🧠 AI`select`[]⚡ 智能优选`[]🇸🇬 SG`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT

custom_proxy_group=🛠 GitHub`select`[]⚡ 智能优选`[]🇭🇰 HK`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT
custom_proxy_group=📨 Telegram`select`[]⚡ 智能优选`[]🇸🇬 SG`[]🇯🇵 JP`[]🇭🇰 HK`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]⚡ 智能优选`[]🇸🇬 SG`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]⚡ 智能优选`[]🇸🇬 SG`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]⚡ 智能优选`[]🇸🇬 SG`[]🇯🇵 JP`[]DIRECT

custom_proxy_group=📸 Instagram`select`[]⚡ 智能优选`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT
custom_proxy_group=🐦 X`select`[]⚡ 智能优选`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]⚡ 智能优选

custom_proxy_group=🔎 Google`select`[]⚡ 智能优选`[]🇯🇵 JP`[]🇸🇬 SG`[]DIRECT
custom_proxy_group=☁️ cloudflare`select`[]⚡ 智能优选`[]DIRECT
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]⚡ 智能优选
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]⚡ 智能优选
custom_proxy_group=🚝 测速工具`select`[]🚀 核心调度`[]DIRECT


; ==========================================================
; 3️⃣ 核心调度层 (关键修正：引入智能判断)
; ==========================================================

; 🚀 核心调度：所有确定要翻墙流量的总出口
custom_proxy_group=🚀 核心调度`select`[]⚡ 智能优选`[]🇸🇬 SG`[]🇯🇵 JP`[]🇭🇰 HK`[]🇺🇸 US`[]🧭 全部节点`[]DIRECT

; 🐟 漏网之鱼：不再死板，你可以手动切换，也可以让它跟随“智能探测”
custom_proxy_group=🐟 漏网之鱼`select`[]🧐 智能探测`[]DIRECT`[]🚀 核心调度

; 🧐 智能探测：Meta 内核黑科技。它会测试直连是否通顺，不通则自动跳代理。
custom_proxy_group=🧐 智能探测`url-test`[]DIRECT`[]🚀 核心调度`https://www.google.com/generate_204`300,600,50


; ==========================================================
; 4️⃣ 自动测速与节点归类 (Meta 特色)
; ==========================================================
custom_proxy_group=⚡ 智能优选`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`https://www.gstatic.com/generate_204`300,600,50
custom_proxy_group=🧭 全部节点`select`.*
custom_proxy_group=🇸🇬 SG`url-test`(?i)(🇸🇬|SG|Singapore)`https://www.gstatic.com/generate_204`300,600,50
custom_proxy_group=🇯🇵 JP`url-test`(?i)(🇯🇵|JP|Japan|Tokyo|Osaka)`https://www.gstatic.com/generate_204`300,600,50
custom_proxy_group=🇭🇰 HK`url-test`(?i)(🇭🇰|HK|Hong Kong)`https://www.gstatic.com/generate_204`300,600,50
custom_proxy_group=🇺🇸 US`url-test`(?i)(🇺🇸|US|United States)`https://www.gstatic.com/generate_204`300,600,50

custom_proxy_group=🌏 主流节点`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`https://www.gstatic.com/generate_204`300,2000,60
custom_proxy_group=🧊 冷门节点`url-test`^(?!.*(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)).*`https://www.gstatic.com/generate_204`300,2000,60
