; ==========================================================
; 2026 终极智能平衡版 · 资源全开修复版
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ----------------------------------------------------------
; 节点清洗：过滤掉机场的广告和无效节点
; ----------------------------------------------------------
exclude=官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|QQ群|客服|工单|官网地址|剩余

; ==========================================================
; 1️⃣ 规则层 (Ruleset)
; ==========================================================

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

ruleset=📺 国内媒体,https://raw.githubusercontent.com/ycl2006/meta/main/MyVideo.yml,21600
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=✨ Gemini,[]GEOSITE,google-gemini
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

ruleset=🛠 GitHub,[]GEOSITE,github
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter
ruleset=🎮 Steam,[]GEOSITE,steam

ruleset=🔎 Google,[]GEOSITE,google
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=🪟 Microsoft,[]GEOSITE,microsoft
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest

ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=🚀 核心调度,[]GEOSITE,gfw
ruleset=🚀 核心调度,[]GEOIP,!cn

ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2️⃣ 应用策略组 (已全面引入冷门节点)
; ==========================================================
custom_proxy_group=📺 国内媒体`select`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点
custom_proxy_group=🤖 ChatGPT`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=✨ Gemini`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🧠 AI`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🛠 GitHub`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]JP`[]SG`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=📨 Telegram`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]🧭 全部节点`[]DIRECT
custom_proxy_group=📸 Instagram`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🐦 X`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]🧭 全部节点
custom_proxy_group=🔎 Google`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]JP`[]SG`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=☁️ cloudflare`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]🧭 全部节点
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]🧭 全部节点
custom_proxy_group=🚝 测速工具`select`[]🚀 核心调度`[]DIRECT

; ==========================================================
; 3️⃣ 核心调度逻辑层
; ==========================================================

; 核心调度：作为全局基础分流代理
custom_proxy_group=🚀 核心调度`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT

; 智能探测：fallback 机制，优先直连，直连不通转代理
custom_proxy_group=🧐 智能探测`fallback`[]DIRECT`[]🚀 核心调度`http://cp.cloudflare.com/generate_204`300

; 漏网之鱼：收尾，确保没有遗漏
custom_proxy_group=🐟 漏网之鱼`select`[]🧐 智能探测`[]🚀 核心调度

; ==========================================================
; 4️⃣ 节点分类与正则提取（包含冷门节点修复）
; ==========================================================

; ✅ 智能优选：自动测速并选择最快节点（1200ms 超时）
custom_proxy_group=⚡ 智能优选`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`http://cp.cloudflare.com/generate_204`1200,1500,200

; ✅ 主流节点：包含四大热门地区
custom_proxy_group=🌏 主流节点`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`http://cp.cloudflare.com/generate_204`1200,2000,200

; ✅ 🧊 冷门节点：利用正则“非”逻辑，提取主流四区以外的所有节点（如英法德、韩国、越南等）
custom_proxy_group=🧊 冷门节点`url-test`^(?!.*(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)).*`http://cp.cloudflare.com/generate_204`1200,2000,200

; ✅ 各地区手动选择组
custom_proxy_group=HK`select`(?i)(🇭🇰|HK|Hong Kong|香港)
custom_proxy_group=SG`select`(?i)(🇸🇬|SG|Singapore|新加坡)
custom_proxy_group=JP`select`(?i)(🇯🇵|JP|Japan|Tokyo|Osaka|日本)
custom_proxy_group=US`select`(?i)(🇺🇸|US|United States|美国)

; ✅ 兜底展示组
custom_proxy_group=🧭 全部节点`select`.*
