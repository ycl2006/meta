; ==========================================================
; 2026 终极智能平衡版 · 节点引用兼容性修正版
; 修改点：统一策略组引用名为纯字母，防止图标导致的 UI 消失
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ----------------------------------------------------------
; 节点清洗 (如果 HK 还是不出，请尝试把这一行删掉)
; ----------------------------------------------------------
exclude=官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|QQ群|客服|工单|官网地址


; ==========================================================
; 1️⃣ 规则层
; ==========================================================

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

ruleset=DIRECT,clash-classic:https://raw.githubusercontent.com/ycl2006/meta/main/MyVideo.list,28800

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=✨ Gemini,[]GEOSITE,google-gemini
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

ruleset=🛠 GitHub,[]GEOSITE,github
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter
ruleset=🎮 Steam,[]GEOSITE,steam

ruleset=🔎 Google,[]GEOSITE,google
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=🪟 Microsoft,[]GEOSITE,microsoft
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest

ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=🚀 核心调度,[]GEOSITE,gfw
ruleset=🚀 核心调度,[]GEOIP,!cn

ruleset=🐟 漏网之鱼,[]FINAL


; ==========================================================
; 2️⃣ 应用策略组 (引用名已改为纯字母 HK/SG/JP/US，确保 100% 显示)
; ==========================================================
custom_proxy_group=🤖 ChatGPT`select`[]⚡ 智能优选`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=✨ Gemini`select`[]⚡ 智能优选`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🧠 AI`select`[]⚡ 智能优选`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT

custom_proxy_group=🛠 GitHub`select`[]⚡ 智能优选`[]HK`[]JP`[]SG`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=📨 Telegram`select`[]⚡ 智能优选`[]HK`[]SG`[]JP`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]⚡ 智能优选`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]⚡ 智能优选`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]⚡ 智能优选`[]HK`[]SG`[]JP`[]🧭 全部节点`[]DIRECT

custom_proxy_group=📸 Instagram`select`[]⚡ 智能优选`[]HK`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🐦 X`select`[]⚡ 智能优选`[]HK`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]⚡ 智能优选`[]HK`[]🧭 全部节点

custom_proxy_group=🔎 Google`select`[]⚡ 智能优选`[]HK`[]JP`[]SG`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=☁️ cloudflare`select`[]⚡ 智能优选`[]HK`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]⚡ 智能优选`[]HK`[]🧭 全部节点
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]⚡ 智能优选`[]HK`[]🧭 全部节点
custom_proxy_group=🚝 测速工具`select`[]🚀 核心调度`[]DIRECT


; ==========================================================
; 3️⃣ 核心调度与智能探测
; ==========================================================
custom_proxy_group=🚀 核心调度`select`[]⚡ 智能优选`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🧐 智能探测`[]DIRECT`[]🚀 核心调度
custom_proxy_group=🧐 智能探测`url-test`[]DIRECT`[]🚀 核心调度`https://www.google.com/generate_204`300,600,50


; ==========================================================
; 4️⃣ 节点分类定义 (这里是关键：定义组名为 HK/SG...)
; ==========================================================
custom_proxy_group=⚡ 智能优选`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`https://www.gstatic.com/generate_204`300,600,50

; 定义时使用纯字母作为 ID，显示时可以带图标
custom_proxy_group=HK`select`(?i)(🇭🇰|HK|Hong Kong|香港)
custom_proxy_group=SG`select`(?i)(🇸🇬|SG|Singapore|新加坡)
custom_proxy_group=JP`select`(?i)(🇯🇵|JP|Japan|Tokyo|Osaka|日本)
custom_proxy_group=US`select`(?i)(🇺🇸|US|United States|美国)

custom_proxy_group=🧭 全部节点`select`.*

custom_proxy_group=🌏 主流节点`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`https://www.gstatic.com/generate_204`300,2000,60
custom_proxy_group=🧊 冷门节点`url-test`^(?!.*(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)).*`https://www.gstatic.com/generate_204`300,2000,60
