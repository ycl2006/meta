; ==========================================================
; 2026 WCC 单兵智能版 · 无 MosDNS 架构专属
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ----------------------------------------------------------
; 核心性能优化
; ----------------------------------------------------------
; 开启嗅探：即使域名没在规则里，也能通过数据包特征自动识别分类
sniffer=true
sniffer_force_domain=google.com,openai.com,netflix.com,youtube.com
; 排除国内不需要嗅探的流量，节省 CPU
sniffer_skip_domain=baidu.com,*.cn,*.alicdn.com,*.qq.com

; ----------------------------------------------------------
; 节点清洗
; ----------------------------------------------------------
exclude=官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|QQ群|客服|工单|官网地址|剩余

; ==========================================================
; 1️⃣ 规则层 (Ruleset)
; ==========================================================
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; AI 组 (必须置顶，防止被泛类规则误杀)
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=✨ Gemini,[]GEOSITE,google-gemini
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

; 视频流媒体 (引用你维护的 MyVideo.yml)
ruleset=📺 国内媒体,https://raw.githubusercontent.com/ycl2006/meta/main/MyVideo.yml

; 基础社交与工具
ruleset=🛠 GitHub,[]GEOSITE,github
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest

; 国内直连 (在没有 MosDNS 时，这部分需覆盖尽可能全)
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,apple-cn
ruleset=DIRECT,[]GEOSITE,microsoft-cn
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; 核心分流
ruleset=🚀 核心调度,[]GEOSITE,gfw
ruleset=🚀 核心调度,[]GEOIP,!cn

; 终极兜底 (由原本的 FINAL 变更为智能探测)
ruleset=🧐 智能探测,[]FINAL

; ==========================================================
; 2️⃣ 节点分组 (开启 Lazy 模式，保护你的 Athena 散热)
; ==========================================================

; ✅ 智能优选：lazy=true 表示只有在有人用网时才测速，平时静默
custom_proxy_group=⚡ 智能优选`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`http://cp.cloudflare.com/generate_204`300,50,lazy=true

custom_proxy_group=🌏 主流节点`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`http://cp.cloudflare.com/generate_204`300,50,lazy=true

; ✅ 冷门节点
custom_proxy_group=🧊 冷门节点`url-test`^(?!.*(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)).*`http://cp.cloudflare.com/generate_204`300,50,lazy=true

; ✅ 手动组
custom_proxy_group=HK`select`(?i)(🇭🇰|HK|Hong Kong|香港)
custom_proxy_group=SG`select`(?i)(🇸🇬|SG|Singapore|新加坡)
custom_proxy_group=JP`select`(?i)(🇯🇵|JP|Japan|Tokyo|Osaka|日本)
custom_proxy_group=US`select`(?i)(🇺🇸|US|United States|美国)
custom_proxy_group=🧭 全部节点`select`.*

; ✅ 业务策略
custom_proxy_group=📺 国内媒体`select`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点
custom_proxy_group=🤖 ChatGPT`select`[]⚡ 智能优选`[]🌏 主流节点`[]US`[]SG`[]🧭 全部节点
custom_proxy_group=✨ Gemini`select`[]⚡ 智能优选`[]🌏 主流节点`[]US`[]SG`[]🧭 全部节点
custom_proxy_group=🧠 AI`select`[]⚡ 智能优选`[]🌏 主流节点`[]US`[]SG`[]🧭 全部节点
custom_proxy_group=🎬 YouTube`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点
custom_proxy_group=🚝 测速工具`select`[]🚀 核心调度`[]DIRECT

; ==========================================================
; 3️⃣ 智能调度层
; ==========================================================
custom_proxy_group=🚀 核心调度`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点

; 🧐 智能探测：Fallback 模式，代理不通时自动切直连，解决“漏网之鱼”断网问题
custom_proxy_group=🧐 智能探测`fallback`[]🚀 核心调度`[]DIRECT`http://cp.cloudflare.com/generate_204`300

; 🐟 漏网之鱼：用户控制界面
custom_proxy_group=🐟 漏网之鱼`select`[]🧐 智能探测`[]🚀 核心调度`[]DIRECT
