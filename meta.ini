; ==========================================================
; 🚀 2026 三模式切换 · 稳定修复终极版
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ----------------------------------------------------------
; 节点清洗
; ----------------------------------------------------------
exclude=官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|QQ群|客服|工单|官网地址|剩余|过期|到期

; ==========================================================
; 1️⃣ 规则层
; ==========================================================
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=✨ Gemini,[]GEOSITE,google-gemini
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎵 TikTok,[]GEOSITE,tiktok

ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🛠 GitHub,[]GEOSITE,github

ruleset=🔎 Google,[]GEOSITE,google
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare

ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=🚀 核心调度,[]GEOSITE,gfw
ruleset=🚀 核心调度,[]GEOIP,!cn

ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2️⃣ 三模式系统（核心）
; ==========================================================

; 🎯 手动节点池
custom_proxy_group=🎯 手动选择`select`.*

; 🟢 自动模式（纯自动，不再依赖筛选）
custom_proxy_group=🟢 自动模式`select`[]⚡ 智能优选

; 🔵 半自动模式（推荐）
custom_proxy_group=🔵 半自动模式`select`[]⚡ 智能优选`[]🎯 手动选择

; 🔴 稳定模式（锁IP）
custom_proxy_group=🔴 稳定模式`select`[]🎯 手动选择

; 🧠 模式切换
custom_proxy_group=🧠 模式切换`select`[]🟢 自动模式`[]🔵 半自动模式`[]🔴 稳定模式

; ==========================================================
; 3️⃣ 核心调度
; ==========================================================

custom_proxy_group=🚀 核心调度`select`[]🧠 模式切换

; 智能判断（保守版，避免误判）
custom_proxy_group=🧐 智能探测`fallback`[]DIRECT`[]🚀 核心调度`http://www.gstatic.com/generate_204`300

; 兜底
custom_proxy_group=🐟 漏网之鱼`select`[]🧐 智能探测`[]🚀 核心调度

; ==========================================================
; 4️⃣ 智能优选（关键修复点）
; ==========================================================

; ❗不再依赖生存筛选，直接从所有节点选
custom_proxy_group=⚡ 智能优选`url-test`(?i)(JP|SG|HK|US|Japan|Singapore|Hong Kong|United States)`http://www.gstatic.com/generate_204`1200,1500,200

; ==========================================================
; 5️⃣ 应用策略
; ==========================================================

custom_proxy_group=🤖 ChatGPT`select`[]🚀 核心调度`[]🎯 手动选择
custom_proxy_group=✨ Gemini`select`[]🚀 核心调度
custom_proxy_group=🧠 AI`select`[]🚀 核心调度`[]🎯 手动选择

custom_proxy_group=🎥 Netflix`select`[]🚀 核心调度`[]🎯 手动选择
custom_proxy_group=🎬 YouTube`select`[]🚀 核心调度
custom_proxy_group=🎵 TikTok`select`[]🚀 核心调度

custom_proxy_group=📨 Telegram`select`[]🚀 核心调度
custom_proxy_group=🛠 GitHub`select`[]🚀 核心调度`[]DIRECT

custom_proxy_group=🔎 Google`select`[]🚀 核心调度
custom_proxy_group=☁️ cloudflare`select`[]🚀 核心调度`[]DIRECT

; ==========================================================
; 6️⃣ 地区节点
; ==========================================================

custom_proxy_group=JP`select`(?i)(JP|Japan|Tokyo|Osaka|日本)
custom_proxy_group=SG`select`(?i)(SG|Singapore|新加坡)
custom_proxy_group=HK`select`(?i)(HK|Hong Kong|香港)
custom_proxy_group=US`select`(?i)(US|United States|美国)

custom_proxy_group=🧭 全部节点`select`.*
