; ==========================================================
; 2026 终极智能平衡版 · 满血回归修正版 (包含主流/冷门分类)
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ----------------------------------------------------------
; 节点清洗
; ----------------------------------------------------------
exclude=官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|QQ群|客服|工单|官网地址|剩余

; ==========================================================
; 1️⃣ 规则层
; ==========================================================
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=✨ Gemini,[]GEOSITE,google-gemini
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

ruleset=🛠 GitHub,[]GEOSITE,github
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter
ruleset=🎮 Steam,[]GEOSITE,steam

ruleset=🔎 Google,[]GEOSITE,google
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=🪟 Microsoft,[]GEOSITE,microsoft
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest

ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=🚀 核心调度,[]GEOSITE,gfw
ruleset=🚀 核心调度,[]GEOIP,!cn

ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2️⃣ 应用策略组 (已增加对主流/冷门节点的引用)
; ==========================================================
custom_proxy_group=🤖 ChatGPT`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=✨ Gemini`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🧠 AI`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT

custom_proxy_group=🛠 GitHub`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]JP`[]SG`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=📨 Telegram`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]🧭 全部节点`[]DIRECT

custom_proxy_group=📸 Instagram`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🐦 X`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]JP`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点`[]🧭 全部节点

custom_proxy_group=🔎 Google`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]JP`[]SG`[]US`[]🧭 全部节点`[]DIRECT
custom_proxy_group=☁️ cloudflare`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]🧭 全部节点`[]DIRECT
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点`[]🧭 全部节点
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点`[]🧭 全部节点
custom_proxy_group=🚝 测速工具`select`[]🚀 核心调度`[]DIRECT

; ==========================================================
; 3️⃣ 核心调度与智能探测
; ==========================================================
custom_proxy_group=🚀 核心调度`select`[]⚡ 智能优选`[]🌏 主流节点`[]HK`[]SG`[]JP`[]US`[]🧭 全部节点`[]DIRECT

; 🧐 智能探测：测试直连 vs 代理 (已加入主流/冷门节点作为备选)
custom_proxy_group=🧐 智能探测`url-test`[]DIRECT`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]🚀 核心调度`http://www.gstatic.com/generate_204`300,600,10

custom_proxy_group=🐟 漏网之鱼`select`[]🧐 智能探测`[]DIRECT`[]🚀 核心调度

; ==========================================================
; 4️⃣ 节点分类定义 (正则匹配)
; ==========================================================
; ⚡ 智能优选：最快的那个
custom_proxy_group=⚡ 智能优选`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`http://www.gstatic.com/generate_204`300,600,50

; 🌏 主流节点：大厂地区集合
custom_proxy_group=🌏 主流节点`url-test`(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)`http://www.gstatic.com/generate_204`300,2000,60

; 🧊 冷门节点：排除掉主流地区后的剩下节点
custom_proxy_group=🧊 冷门节点`url-test`^(?!.*(?i)(🇸🇬|SG|Singapore|🇯🇵|JP|Japan|Tokyo|Osaka|🇭🇰|HK|Hong Kong|🇺🇸|US|United States)).*`http://www.gstatic.com/generate_204`300,2000,60

custom_proxy_group=HK`select`(?i)(🇭🇰|HK|Hong Kong|香港)
custom_proxy_group=SG`select`(?i)(🇸🇬|SG|Singapore|新加坡)
custom_proxy_group=JP`select`(?i)(🇯🇵|JP|Japan|Tokyo|Osaka|日本)
custom_proxy_group=US`select`(?i)(🇺🇸|US|United States|美国)

custom_proxy_group=🧭 全部节点`select`.*
