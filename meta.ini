; ==========================================================
; 2026 终极智能平衡版 · 自动测速 + 手动兜底
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ----------------------------------------------------------
; 节点清洗：过滤掉广告、无效节点
; ----------------------------------------------------------
exclude=官网|网站|失联|公告|通知|TG|电报|群|客服|工单|剩余|到期|流量|套餐

; ==========================================================
; 1️⃣ 规则层 (Ruleset)
; ==========================================================

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; 📺 国内媒体（B站/腾讯/爱奇艺直连）
ruleset=📺 国内媒体,https://raw.githubusercontent.com/ycl2006/meta/main/MyVideo.yml

; AI
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=✨ Gemini,[]GEOSITE,google-gemini
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

; 常用流媒体
ruleset=🛠 GitHub,[]GEOSITE,github
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter
ruleset=🎮 Steam,[]GEOSITE,steam

; 搜索 / 工具
ruleset=🔎 Google,[]GEOSITE,google
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=🪟 Microsoft,[]GEOSITE,microsoft
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest

; 国内直连
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; 核心调度（国外） 
ruleset=🚀 核心调度,[]GEOSITE,gfw
ruleset=🚀 核心调度,[]GEOIP,!cn

; 漏网之鱼
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2️⃣ 策略组（自动测速 + 手动兜底）
; ==========================================================

; 🌐 手动选择组
custom_proxy_group=🌐 手动选择`select`.*

; ⚡ 自动测速组（全局 fallback）
custom_proxy_group=⚡ 智能优选`url-test`.*`http://cp.cloudflare.com/generate_204`1200,2000,50`[]🌐 手动选择

; -----------------------
; 🌏 主流地区节点（自动测速 + 手动兜底）
; -----------------------
custom_proxy_group=🇯🇵 日本`url-test`(?i)(JP|Japan|Tokyo|Osaka|日本|东京)`http://cp.cloudflare.com/generate_204`1200,2000,50`[]🌐 手动选择
custom_proxy_group=🇭🇰 香港`url-test`(?i)(HK|Hong Kong|香港)`http://cp.cloudflare.com/generate_204`1200,2000,50`[]🌐 手动选择
custom_proxy_group=🇸🇬 新加坡`url-test`(?i)(SG|Singapore|新加坡)`http://cp.cloudflare.com/generate_204`1200,2000,50`[]🌐 手动选择
custom_proxy_group=🇺🇸 美国`url-test`(?i)(US|United States|America|美国)`http://cp.cloudflare.com/generate_204`1200,2000,50`[]🌐 手动选择

; -----------------------
; 🧊 冷门节点（非四大热门地区）
; -----------------------
custom_proxy_group=🧊 冷门节点`url-test`^(?!.*(?i)(JP|Japan|Tokyo|Osaka|日本|东京|HK|Hong Kong|香港|SG|Singapore|新加坡|US|United States|America|美国)).*`http://cp.cloudflare.com/generate_204`1200,2000,50`[]🌐 手动选择

; -----------------------
; 核心调度组（全局 fallback）
; -----------------------
custom_proxy_group=🚀 核心调度`select`[]⚡ 智能优选`[]🌏 主流节点`[]🧊 冷门节点`[]🌐 手动选择`[]DIRECT

; 智能探测（fallback 优先直连）
custom_proxy_group=🧐 智能探测`fallback`[]DIRECT`[]🚀 核心调度`http://cp.cloudflare.com/generate_204`300

; 漏网之鱼收尾
custom_proxy_group=🐟 漏网之鱼`select`[]🧐 智能探测`[]🚀 核心调度

; ==========================================================
; 3️⃣ 应用策略组（针对各服务）
; ==========================================================

custom_proxy_group=📺 国内媒体`select`[]DIRECT`[]🚀 核心调度
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国`[]🚀 核心调度`[]DIRECT
custom_proxy_group=✨ Gemini`select`[]🚀 核心调度`[]🌏 主流节点
custom_proxy_group=🧠 AI`select`[]🚀 核心调度`[]🌏 主流节点
custom_proxy_group=🛠 GitHub`select`[]🚀 核心调度
custom_proxy_group=📨 Telegram`select`[]🚀 核心调度
custom_proxy_group=🎬 YouTube`select`[]🚀 核心调度
custom_proxy_group=🎥 Netflix`select`[]🚀 核心调度
custom_proxy_group=🎵 TikTok`select`[]🚀 核心调度
custom_proxy_group=📸 Instagram`select`[]🚀 核心调度
custom_proxy_group=🐦 X`select`[]🚀 核心调度
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]🚀 核心调度
custom_proxy_group=🔎 Google`select`[]🚀 核心调度
custom_proxy_group=☁️ cloudflare`select`[]🚀 核心调度
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🚀 核心调度
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 核心调度
custom_proxy_group=🚝 测速工具`select`[]🚀 核心调度
