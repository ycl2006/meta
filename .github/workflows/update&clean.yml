name: Update Video Rules (PROD)

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 删除了 cache: 'pip' 以避免找不到 requirements.txt 的报错

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f MyVideo.yml ]; then
            git add MyVideo.yml
            if git diff --staged --quiet; then
              echo "No changes, skipping commit."
            else
              COUNT=$(grep -c "DOMAIN" MyVideo.yml || echo "0")
              TIME=$(TZ='Asia/Shanghai' date +'%m-%d %H:%M')
              MSG="🤖chore: 规则重构更新(${COUNT}条) $TIME"
              git commit -m "$MSG"
              git push
            fi
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: always() 
    permissions:
      actions: write
    steps:
      - name: Delete old runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取运行记录的 ID 列表，每行一个 ID
          # --limit 50 表示获取最近 50 条
          # tail -n +6 表示跳过前 5 条（即保留最近的 5 条记录）
          run_ids=$(gh run list -R ${{ github.repository }} --limit 50 --json databaseId --template '{{range .}}{{ .databaseId }}{{"\n"}}{{end}}' | tail -n +6)

          if [ ! -z "$run_ids" ]; then
            echo "正在清理旧的运行记录..."
            for id in $run_ids; do
              # 显式指定仓库删除
              gh run delete -R ${{ github.repository }} "$id"
            done
            echo "清理完成。"
          else
            echo "没有需要清理的旧记录（当前记录少于 5 条）。"
          fi
