name: Update Video Rules (PROD)

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 核心修复：实时计算 DOMAIN 行数
          if [ -f MyVideo.yml ]; then
            COUNT=$(grep -c "DOMAIN" MyVideo.yml || echo "0")
            git add MyVideo.yml
            
            # 只有文件内容真正变化时才 Commit
            if git diff --staged --quiet; then
              echo "No changes, skipping commit."
            else
              # 构建 Commit 消息
              TIME=$(TZ='Asia/Shanghai' date +'%m-%d %H:%M')
              MSG="🤖chore: 规则重构更新(${COUNT}条) $TIME"
              echo "Creating commit: $MSG"
              git commit -m "$MSG"
              git push
            fi
          fi

  # 定期清理历史记录，保持仓库整洁
 cleanup:
  runs-on: ubuntu-latest
  needs: build
  permissions:
    actions: write
  steps:
    - name: Delete old runs
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        run_ids=$(gh run list --limit 50 --json databaseId --jq '.[5:] | map(.databaseId) | .[]' 2>/dev/null || echo "")
        if [ ! -z "$run_ids" ]; then
          for id in $run_ids; do
            gh api repos/${{ github.repository }}/actions/runs/$id -X DELETE
          done
        fi
