name: Update Video Rules (PROD)

on:
  schedule:
    - cron: '0 0,8,16 * * *' # Runs at 00:00, 08:00, 16:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: ' ' # Speeds up subsequent runs

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f MyVideo.yml ]; then
            git add MyVideo.yml
            
            # Check if there are actual changes staged
            if git diff --staged --quiet; then
              echo "No changes detected in MyVideo.yml. Skipping commit."
            else
              COUNT=$(grep -c "DOMAIN" MyVideo.yml || echo "0")
              TIME=$(TZ='Asia/Shanghai' date +'%m-%d %H:%M')
              MSG="🤖 chore: 规则重构更新(${COUNT}条) $TIME"
              
              git commit -m "$MSG"
              git push
            fi
          else
            echo "Error: MyVideo.yml not found!"
            exit 1
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: always() # Ensure cleanup runs even if build fails
    permissions:
      actions: write
    steps:
      - name: Delete old runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Deletes all but the 10 most recent runs
          gh run list --limit 50 --json databaseId  --jq '.[5:].databaseId' | \
          xargs -I{} gh api repos/${{ github.repository }}/actions/runs/{} -X DELETE
