name: Update Video Rules (PROD)

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 删除了 cache: 'pip' 以避免找不到 requirements.txt 的报错

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f MyVideo.yml ]; then
            git add MyVideo.yml
            if git diff --staged --quiet; then
              echo "No changes, skipping commit."
            else
              COUNT=$(grep -c "DOMAIN" MyVideo.yml || echo "0")
              TIME=$(TZ='Asia/Shanghai' date +'%m-%d %H:%M')
              MSG="🤖chore: 规则重构更新(${COUNT}条) $TIME"
              git commit -m "$MSG"
              git push
            fi
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: always() 
    permissions:
      actions: write
    steps:
      - name: Delete old runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 核心修复：显式指定 -R 仓库，不再依赖本地 .git 文件夹
          # 这样即便不执行 checkout 步骤，脚本也能通过 API 正常运行
          run_ids=$(gh run list -R ${{ github.repository }} --limit 50 --json databaseId --jq '.[5:].databaseId' || echo "")
          
          if [ ! -z "$run_ids" ]; then
            for id in $run_ids; do
              gh api repos/${{ github.repository }}/actions/runs/$id -X DELETE
            done
            echo "Cleanup completed."
          else
            echo "No old runs to clean."
          fi
