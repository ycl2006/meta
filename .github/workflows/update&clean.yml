name: Update Video Rules

on:
  schedule:
    # 北京时间：08:00, 16:00, 00:00
    - cron: '0 0,8,16 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f MyVideo.yml ]; then
            git add MyVideo.yml
            
            if git diff --staged --quiet; then
              echo "No changes in MyVideo.yml, skipping commit."
            else
              COUNT=$(grep -c "DOMAIN" MyVideo.yml)
              TZ='Asia/Shanghai' git commit -m "🤖chore: 规则重构更新($COUNT条) $(date +'%Y-%m-%d %H:%M')"
              git push
            fi
          else
            echo "Error: MyVideo.yml was not generated!"
            exit 1
          fi

  # --- 使用 GitHub 原生命令清理记录 ---
  cleanup:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Delete old runs using GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取除了最新的 5 个以外的所有运行记录 ID 并删除
          run_ids=$(gh run list --limit 100 --json databaseId  --jq '.[5:].[].databaseId')
          for id in $run_ids; do
            gh run delete "$id"
          done
