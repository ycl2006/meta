name: Update Video Rules

on:
  schedule:
    # 北京时间：08:00, 16:00, 00:00
    - cron: '0 0,8,16 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查新生成的 .list 文件是否存在
          if [ -f MyVideo.list ]; then
            git add MyVideo.list
            
            # 如果以前有旧的 .yml，可以顺便删掉它，保持仓库整洁
            if [ -f MyVideo.yml ]; then
              git rm MyVideo.yml
            fi
            
            if git diff --staged --quiet; then
              echo "No changes in MyVideo.list, skipping commit."
            else
              # 统计新格式下的规则数量
              COUNT=$(grep -c "DOMAIN" MyVideo.list)
              TZ='Asia/Shanghai' git commit -m "🤖chore: 规则重构更新($COUNT条) $(date +'%Y-%m-%d %H:%M')"
              git push
            fi
          else
            echo "Error: MyVideo.list was not generated!"
            exit 1
          fi

  # --- 使用 GitHub 原生命令清理记录 ---
  cleanup:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Delete old runs using GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          run_ids=$(gh run list --repo "$REPO" --limit 100 --json databaseId --jq '.[5:] | map(.databaseId) | .[]' 2>/dev/null || echo "")
          
          if [ -z "$run_ids" ]; then
            echo "没有多余的运行记录需要清理。"
          else
            for id in $run_ids; do
              echo "正在删除运行记录: $id"
              gh run delete --repo "$REPO" "$id"
            done
            echo "清理完成！"
          fi
