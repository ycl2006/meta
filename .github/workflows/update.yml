name: Update Video Rules

on:
  schedule:
    # 北京时间：08:00, 16:00, 00:00 (对应 UTC: 00, 08, 16)
    - cron: '0 0,8,16 * * *' 
  workflow_dispatch: # 保留手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Convert List to YAML
        run: |
          # 核心转换逻辑：将 .list 转换为带 payload 头和横杠格式的 .yml
          if [ -f MyVideo.list ]; then
            echo "payload:" > MyVideo.yml
            sed 's/^/  - /' MyVideo.list >> MyVideo.yml
            echo "Successfully converted MyVideo.list to MyVideo.yml"
          else
            echo "Warning: MyVideo.list not found, checking if MyVideo.yml already exists..."
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 强制清理旧的 .list 文件，解决 local modifications 报错
          # 使用 -f 强制删除并忽略不存在的情况
          git rm -f MyVideo.list --ignore-unmatch
          
          # 2. 检查并添加新的 .yml 文件
          if [ -f MyVideo.yml ]; then
            git add MyVideo.yml
            
            # 3. 只有在内容真正变化时才提交
            if git diff --staged --quiet; then
              echo "No changes in MyVideo.yml, skipping commit."
            else
              # 统计新增行数（减去第一行的 payload:）
              RAW_COUNT=$(git diff --staged MyVideo.yml | grep "^+" | grep -v "+++" | wc -l)
              ADDED_LINES=$((RAW_COUNT > 0 ? RAW_COUNT - 1 : 0))
              
              TZ='Asia/Shanghai' git commit -m "🤖chore: 自动更新YML规则($ADDED_LINES条) $(date +'%Y-%m-%d %H:%M')"
              git push
            fi
          else
            echo "Error: MyVideo.yml was not generated!"
            exit 1
          fi
