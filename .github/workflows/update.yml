name: Update Video Rules

on:
  schedule:
    # 北京时间：08:00, 16:00, 00:00 (对应 UTC: 00, 08, 16)
    - cron: '0 0,8,16 * * *' 
  workflow_dispatch: # 保留手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Convert List to YAML
        run: |
          # 核心转换逻辑：先清理可能存在的旧 yml，确保重新生成
          rm -f MyVideo.yml
          if [ -f MyVideo.list ]; then
            echo "payload:" > MyVideo.yml
            # 1. grep -v 过滤掉原文件里可能存在的 payload 声明
            # 2. sed 去掉行首已有的空格或横杠，确保每行是干净的域名格式
            # 3. 统一加上标准的 '  - ' 前缀
            grep -v "payload" MyVideo.list | sed 's/^[[:space:]-]*//' | sed 's/^/  - /' >> MyVideo.yml
            echo "Successfully converted MyVideo.list to MyVideo.yml"
          else
            echo "Error: MyVideo.list not found!"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制清理旧的 .list 文件，避免冲突
          git rm -f MyVideo.list --ignore-unmatch
          
          if [ -f MyVideo.yml ]; then
            git add MyVideo.yml
            
            if git diff --staged --quiet; then
              echo "No changes in MyVideo.yml, skipping commit."
            else
              # 统计新增行数
              RAW_COUNT=$(git diff --staged MyVideo.yml | grep "^+" | grep -v "+++" | wc -l)
              ADDED_LINES=$((RAW_COUNT > 0 ? RAW_COUNT - 1 : 0))
              
              TZ='Asia/Shanghai' git commit -m "🤖chore: 自动更新YML规则($ADDED_LINES条) $(date +'%Y-%m-%d %H:%M')"
              git push
            fi
          else
            echo "Error: MyVideo.yml was not generated!"
            exit 1
          fi
