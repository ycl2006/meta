name: Update Video Rules

on:
  schedule:
    # 北京时间：08:00, 16:00, 00:00
    - cron: '0 0,8,16 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Fix and Clean YAML Format
        run: |
          # 检查脚本生成的 yml 并清洗格式
          if [ -f MyVideo.yml ]; then
            echo "Cleaning MyVideo.yml format..."
            
            # 提取核心域名规则并去重
            RAW_DATA=$(grep "DOMAIN" MyVideo.yml | sed 's/^[[:space:]-]*//' | sed 's/payload://g' | sort -u)
            
            # 构建标准格式
            echo "payload:" > MyVideo.tmp
            if [ -n "$RAW_DATA" ]; then
                echo "$RAW_DATA" | sed 's/^/  - /' >> MyVideo.tmp
            fi
            
            mv MyVideo.tmp MyVideo.yml
            echo "Format fixed. Content head:"
            head -n 5 MyVideo.yml
          else
            echo "Error: MyVideo.yml not found!"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制清理旧的 list
          git rm -f MyVideo.list --ignore-unmatch
          
          if [ -f MyVideo.yml ]; then
            git add MyVideo.yml
            
            if git diff --staged --quiet; then
              echo "No changes in MyVideo.yml, skipping commit."
            else
              COUNT=$(grep -c "DOMAIN" MyVideo.yml)
              TZ='Asia/Shanghai' git commit -m "🤖chore: 规则重构更新($COUNT条) $(date +'%Y-%m-%d %H:%M')"
              git push
            fi
          fi
