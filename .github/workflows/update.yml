name: Update Video Rules

on:
  schedule:
    # 北京时间：08:00, 16:00, 00:00
    - cron: '0 0,8,16 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          PYTHONUNBUFFERED: 1
        run: python generate_rules.py

      - name: Fix and Clean YAML Format
        run: |
          # 如果脚本生成了 yml，我们对其进行格式清洗
          if [ -f MyVideo.yml ]; then
            echo "Cleaning MyVideo.yml format..."
            
            # 1. 提取所有包含 DOMAIN 的行 (这是规则的核心)
            # 2. 清理行首所有的空格、横杠、以及可能存在的 payload: 关键字
            # 3. sort -u 自动去重并排序，保持文件整洁
            RAW_DATA=$(grep "DOMAIN" MyVideo.yml | sed 's/^[[:space:]-]*//' | sed 's/payload://g' | sort -u)
            
            # 4. 重新构建标准 YAML 结构
            echo "payload:" > MyVideo.tmp
            if [ -n "$RAW_DATA" ]; then
                echo "$RAW_DATA" | sed 's/^/  - /' >> MyVideo.tmp
            fi
            
            # 5. 覆盖原文件
            mv MyVideo.tmp MyVideo.yml
            echo "Format fixed. Content summary:"
            head -n 5 MyVideo.yml
          else
            echo "Error: MyVideo.yml not found! Check your Python script output."
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制移除可能残留的旧 list 文件，不纠结它是否存在
          git rm -f MyVideo.list --ignore-unmatch
          
          if [ -f MyVideo.yml ]; then
            git add MyVideo.yml
            
            if git diff --staged --quiet; then
              echo "No changes in MyVideo.yml, skipping commit."
            else
              # 统计有效域名条数
              COUNT=$(grep -c "DOMAIN" MyVideo.yml)
              TZ='Asia/Shanghai' git commit -m "🤖chore: 规则重构更新($COUNT条) $(date +'%Y-%m-%d %H:%M')"
              git push
            fi
          fi
